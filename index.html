<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beyblade X Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="backdrop-layer" onclick="closePartsModal()"></div>
    <div id="announcement-layer"></div>

    <div id="parts-modal">
        <div class="modal-header">
            <span class="modal-title" id="modal-player-title">Select Player Combo</span>
            <button class="modal-close" onclick="savePartsSelection()">Confirm</button>
        </div>

        <div class="form-group">
            <label for="select-system">Blade System Generation</label>
            <select id="select-system" onchange="toggleSystemArchitectureLayout(this.value)">
                <option value="STANDARD">BX / UX Line (Solid 1-Piece Blade)</option>
                <option value="CX_STANDARD">CX Line (Modular 3-Piece Blade)</option>
                <option value="CX_EXPAND">CX Expand System (Modular 4-Piece Blade)</option>
            </select>
        </div>

        <hr style="border:0; border-top:1px solid #333; margin:15px 0;">

        <div id="part-selectors-zone"></div>
    </div>

    <h1 style="display: inline-flex; align-items: center; gap: 15px; margin: 5px 0 15px 0;">
        Blader Scorekeeper
        <button id="fullscreen-btn" onclick="toggleFullscreen()" title="Toggle Fullscreen"
            style="background: #2f3542; color: white; border: none; border-radius: 6px; width: 36px; height: 36px; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s;">
            ⛶
        </button>
    </h1>
    
    <div class="settings-container">
        <div class="settings">
            <div>Points to Set:</div>
            <div class="settings-control">
                <button class="btn-small" onclick="adjustPointsLimit(-1)">-</button>
                <span id="limit-display" class="limit-display">4</span>
                <button class="btn-small" onclick="adjustPointsLimit(1)">+</button>
            </div>
        </div>

        <div class="settings">
            <div>Sets to Match:</div>
            <div class="settings-control">
                <button class="btn-small" onclick="adjustSetsLimit(-1)">-</button>
                <span id="sets-limit-display" class="limit-display">2</span>
                <button class="btn-small" onclick="adjustSetsLimit(1)">+</button>
            </div>
        </div>
    </div>
    
    <button id="countdown" onclick="startCountdown()">3, 2, 1, Go Shoot!</button>

    <div class="score-board" id="main-scoreboard">
        <div class="player" id="player-card-1">
            <input type="text" id="p1-name" class="name-input" value="Player 1">
            <div class="combo-badge" id="p1-combo" onclick="openPartsModal(1)">+ Select Combo</div>
            <div class="set-display">SETS: <span id="p1-sets">0</span></div>
            <div><div class="score" id="p1-display">0</div></div>
            <button class="action-btn spin" onclick="addScore(1, 1, 'spin')">Spin (+1)</button>
            <button class="action-btn over" onclick="addScore(1, 2, 'over')">Over (+2)</button>
            <button class="action-btn burst" onclick="addScore(1, 2, 'burst')">Burst (+2)</button>
            <button class="action-btn xtreme" onclick="addScore(1, 3, 'xtreme')">Xtreme (+3)</button>
        </div>

        <div class="player" id="player-card-2">
            <input type="text" id="p2-name" class="name-input" value="Player 2">
            <div class="combo-badge" id="p2-combo" onclick="openPartsModal(2)">+ Select Combo</div>
            <div class="set-display">SETS: <span id="p2-sets">0</span></div>
            <div><div class="score" id="p2-display">0</div></div>
            <button class="action-btn spin" onclick="addScore(2, 1, 'spin')">Spin (+1)</button>
            <button class="action-btn over" onclick="addScore(2, 2, 'over')">Over (+2)</button>
            <button class="action-btn burst" onclick="addScore(2, 2, 'burst')">Burst (+2)</button>
            <button class="action-btn xtreme" onclick="addScore(2, 3, 'xtreme')">Xtreme (+3)</button>
        </div>
    </div>

    <div class="log-heading">BATTLE LOG</div>
    <div id="history-log">
        <div id="empty-log-msg">No rounds recorded yet. Let 'er rip!</div>
    </div>

    <div class="control-panel">
        <button class="utility-btn btn-undo" onclick="undoLast()">Undo Last</button>
        <button class="utility-btn btn-reset" onclick="resetGame()">Reset Match</button>
    </div>

    <script src="parts.js"></script>
    <script src="app.js"></script>
</body>
</html>
