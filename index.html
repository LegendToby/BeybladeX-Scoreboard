<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beyblade X Counter</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background: #121212; 
            color: white; 
            padding: 20px 10px; 
            overflow-x: hidden; 
            position: relative; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
        }

        h1 { font-size: 2.2rem; margin: 5px 0 15px 0; letter-spacing: 1px; }
        
        .settings-container { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            width: 100%;
            max-width: 600px; 
            margin-bottom: 15px; 
        }
        .settings { 
            background: #1e1e1e; 
            padding: 12px; 
            border-radius: 8px; 
            flex: 1; 
            font-size: 1rem;
            border: 1px solid #333; 
        }
        .settings-control { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 5px; }
        .btn-small { background: #444; color: white; border: none; padding: 4px 14px; font-size: 1.2rem; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .btn-small:hover { background: #555; }
        .limit-display { font-size: 1.4rem; font-weight: bold; color: #00d2d3; min-width: 25px; }
        
        #countdown { 
            background: #2ed573; 
            font-size: 1.5rem; 
            padding: 15px 30px; 
            margin-bottom: 20px; 
            width: 100%; 
            max-width: 600px; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            z-index: 1; 
            position: relative; 
            box-shadow: 0 4px 10px rgba(46, 213, 115, 0.3); 
        }
        
        /* SCOREBOARD GRID */
        .score-board { 
            display: flex; 
            justify-content: space-between; 
            gap: 20px;
            width: 100%;
            max-width: 800px; 
            margin-bottom: 20px;
            position: relative; 
            z-index: 1; 
        }
        
        .player { 
            border: 2px solid #333; 
            padding: 25px 15px; 
            border-radius: 12px; 
            flex: 1;
            min-width: 0; 
            background: #1a1a1a; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.3); 
        }
        
        .name-input { 
            background: transparent; 
            color: white; 
            border: none; 
            text-align: center; 
            font-size: 1.6rem; 
            font-weight: bold; 
            width: 90%; 
            margin: 0 auto 6px auto;
            padding-bottom: 4px; 
        }
        #p1-name { border-bottom: 2px solid #3d3d3d; }
        #p1-name:focus { border-bottom: 2px solid #ff4757; outline: none; }
        #p2-name { border-bottom: 2px solid #3d3d3d; }
        #p2-name:focus { border-bottom: 2px solid #0fbcf9; outline: none; }

        .set-display { 
            font-size: 0.9rem; 
            color: #ffffff; 
            font-weight: 800; 
            letter-spacing: 1px; 
            background: linear-gradient(135deg, #ff4757, #ff6b81); 
            padding: 6px 12px; 
            border-radius: 50px; 
            display: inline-block; 
            align-self: center;
            text-transform: uppercase;
        }

        .score { font-size: 5rem; font-weight: bold; margin: 5px 0; color: #ffcc00; display: inline-block; }
        
        button.action-btn { 
            color: white; 
            border: none; 
            padding: 12px 6px; 
            font-size: 1.1rem; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            transition: transform 0.1s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        button.action-btn:active { transform: scale(0.96); }
        button.spin { background: #485460; }
        button.over { background: #0fbcf9; }
        button.burst { background: #ffa502; }
        button.xtreme { background: #9b59b6; box-shadow: 0 0 6px rgba(155, 89, 182, 0.4); } 

        /* LOG AND CONTROLS */
        .log-heading { margin-top: 15px; color: #a4b0be; letter-spacing: 1px; font-size: 1.1rem; }
        #history-log { 
            background: #1e1e1e; 
            width: 100%;
            max-width: 600px; 
            margin: 8px auto 20px auto; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #333; 
            height: 120px; 
            overflow-y: auto; 
            text-align: left;
        }
        #empty-log-msg { color: #747d8c; text-align: center; font-style: italic; font-size: 1rem; }

        /* FIXED: Added z-index and position properties so control panel breaks through full screen victory overlays */
        .control-panel { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            width: 100%; 
            max-width: 600px; 
            position: relative; 
            z-index: 1000; 
        }
        .utility-btn { color: white; border: none; padding: 12px 20px; font-size: 1.1rem; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1; }
        .btn-reset { background: #747d8c; }
        .btn-undo { background: #e1b12c; }

        /* OVERLAYS AND ANIMATIONS */
        #backdrop-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.75); z-index: 998; opacity: 0;
            pointer-events: none; transition: opacity 0.25s ease;
        }
        #backdrop-layer.active { opacity: 1; }

        #announcement-layer {
            position: fixed; top: 40%; left: 50%; font-size: 3.5rem; font-weight: 900;
            text-transform: uppercase; font-style: italic; letter-spacing: 1px;
            pointer-events: none; opacity: 0; z-index: 999; white-space: nowrap;
        }

        @keyframes scorePop {
            0% { transform: scale(1); color: #ffcc00; }
            20% { transform: scale(1.3); color: #2ed573; text-shadow: 0 0 10px #2ed573; }
            100% { transform: scale(1); color: #ffcc00; }
        }
        .pop { animation: scorePop 0.4s ease-out; }

        @keyframes intenseShake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            10% { transform: translate(-4px, -3px) rotate(-1deg); }
            20% { transform: translate(4px, 3px) rotate(1deg); }
            30% { transform: translate(-3px, 4px) rotate(0deg); }
            40% { transform: translate(3px, -3px) rotate(1deg); }
            50% { transform: translate(-4px, 3px) rotate(-1deg); }
            60% { transform: translate(3px, -4px) rotate(0deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .shake-active { animation: intenseShake 0.5s ease-in-out; }

        /* ANIMATION SPEEDS */
        @keyframes spinAnim {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-180deg); opacity: 0; }
            15%, 85% { transform: translate(-50%, -50%) scale(1.2) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5) rotate(90deg); opacity: 0; }
        }
        .anim-spin { animation: spinAnim 2.2s ease-in-out forwards; }

        @keyframes overAnim {
            0% { transform: translate(-100%, -100%) scale(0.5); opacity: 0; }
            20%, 85% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
            100% { transform: translate(0%, 0%) scale(0.5); opacity: 0; }
        }
        .anim-over { animation: overAnim 2.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes burstExplode {
            0% { transform: translate(-50%, -50%) scale(0.2); opacity: 0; }
            10%, 85% { transform: translate(-50%, -50%) scale(1.4); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; filter: blur(5px); }
        }
        .anim-burst { animation: burstExplode 2.2s cubic-bezier(0.1, 0.8, 0.1, 1) forwards; }

        @keyframes xtremeImpact {
            0% { transform: translate(-50%, -50%) scale(4); opacity: 0; }
            8%, 80% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
        }
        .anim-xtreme { animation: xtremeImpact 2.2s cubic-bezier(0.15, 1.1, 0.3, 1) forwards; }

        @keyframes setCompleteAnim {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
            15%, 85% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
        }
        .anim-set-complete { animation: setCompleteAnim 3.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes victoryAnim {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(0.9); opacity: 1; }
        }
        .anim-victory { animation: victoryAnim 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        .txt-spin { color: #ffffff; text-shadow: 0 0 10px #7f8c8d, 0 0 20px #ffffff; }
        .txt-over { color: #0fbcf9; text-shadow: 0 0 15px #0fbcf9, 0 0 30px #00a8ff; }
        .txt-burst { color: #ffa502; text-shadow: 0 0 15px #ffa502, 0 0 30px #ff7f50; }
        .txt-xtreme { color: #ef57ff; text-shadow: 0 0 15px #9b59b6, 0 0 30px #ef57ff; font-weight: 950; }
        
        .txt-set-complete { color: #2ed573; text-shadow: 0 0 15px #2ed573, 0 0 30px #26de81; }
        .sub-set { font-size: 1.5rem; color: #ffffff; text-shadow: none; display: block; margin-top: 5px; font-weight: bold; }

        .txt-victory { color: #ffdd59; text-shadow: 0 0 20px #ffdd59, 0 0 40px #ffd32a; font-size: 3.5rem; line-height: 1.2; }
        .sub-victory { font-size: 1.8rem; color: #ffffff; text-shadow: none; display: block; margin-top: 8px; font-weight: bold; }

        /* DYNAMIC MOBILE MEDIA QUERY OVERRIDE */
        @media (max-width: 600px) {
            body { padding: 10px; }
            h1 { font-size: 1.6rem; margin: 5px 0 10px 0; }
            
            .settings-container { gap: 10px; margin-bottom: 10px; }
            .settings { padding: 8px; font-size: 0.8rem; }
            .btn-small { padding: 2px 10px; font-size: 1rem; }
            .limit-display { font-size: 1.1rem; }
            
            #countdown { font-size: 1.2rem; padding: 10px 20px; margin-bottom: 15px; }
            
            .score-board { gap: 10px; margin-bottom: 15px; }
            .player { padding: 12px 8px; gap: 6px; }
            
            .name-input { font-size: 1.1rem; }
            .set-display { font-size: 0.7rem; padding: 4px 8px; }
            .score { font-size: 3rem; margin: 2px 0; }
            
            button.action-btn { font-size: 0.8rem; padding: 8px 4px; border-radius: 5px; }
            
            .log-heading { font-size: 0.9rem; }
            #history-log { height: 90px; padding: 8px; margin-bottom: 15px; }
            #empty-log-msg { font-size: 0.8rem; }
            
            .control-panel { gap: 10px; }
            .utility-btn { padding: 10px 15px; font-size: 0.9rem; }
            
            #announcement-layer { font-size: 2.2rem; top: 35%; }
            .sub-set { font-size: 1.1rem; }
            .txt-victory { font-size: 2.5rem; }
            .sub-victory { font-size: 1.3rem; }
        }

        @media (max-width: 360px) {
            h1 { font-size: 1.3rem; }
            .score { font-size: 2.4rem; }
            button.action-btn { font-size: 0.7rem; padding: 6px 2px; }
            .name-input { font-size: 0.95rem; }
            #announcement-layer { font-size: 1.6rem; }
            .txt-victory { font-size: 1.9rem; }
            .sub-victory { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div id="backdrop-layer"></div>
    <div id="announcement-layer"></div>

    <h1>Blader Scorekeeper</h1>
    
    <div class="settings-container">
        <div class="settings">
            <div>Points to Set:</div>
            <div class="settings-control">
                <button class="btn-small" onclick="adjustPointsLimit(-1)">-</button>
                <span id="limit-display" class="limit-display">4</span>
                <button class="btn-small" onclick="adjustPointsLimit(1)">+</button>
            </div>
        </div>

        <div class="settings">
            <div>Sets to Match:</div>
            <div class="settings-control">
                <button class="btn-small" onclick="adjustSetsLimit(-1)">-</button>
                <span id="sets-limit-display" class="limit-display">2</span>
                <button class="btn-small" onclick="adjustSetsLimit(1)">+</button>
            </div>
        </div>
    </div>
    
    <button id="countdown" onclick="startCountdown()">3, 2, 1, Go Shoot!</button>

    <div class="score-board" id="main-scoreboard">
        <div class="player" id="player-card-1">
            <input type="text" id="p1-name" class="name-input" value="Player 1">
            <div class="set-display">SETS: <span id="p1-sets">0</span></div>
            <div><div class="score" id="p1-display">0</div></div>
            <button class="action-btn spin" onclick="addScore(1, 1, 'spin')">Spin (+1)</button>
            <button class="action-btn over" onclick="addScore(1, 2, 'over')">Over (+2)</button>
            <button class="action-btn burst" onclick="addScore(1, 2, 'burst')">Burst (+2)</button>
            <button class="action-btn xtreme" onclick="addScore(1, 3, 'xtreme')">Xtreme (+3)</button>
        </div>

        <div class="player" id="player-card-2">
            <input type="text" id="p2-name" class="name-input" value="Player 2">
            <div class="set-display">SETS: <span id="p2-sets">0</span></div>
            <div><div class="score" id="p2-display">0</div></div>
            <button class="action-btn spin" onclick="addScore(2, 1, 'spin')">Spin (+1)</button>
            <button class="action-btn over" onclick="addScore(2, 2, 'over')">Over (+2)</button>
            <button class="action-btn burst" onclick="addScore(2, 2, 'burst')">Burst (+2)</button>
            <button class="action-btn xtreme" onclick="addScore(2, 3, 'xtreme')">Xtreme (+3)</button>
        </div>
    </div>

    <div class="log-heading">BATTLE LOG</div>
    <div id="history-log">
        <div id="empty-log-msg">No rounds recorded yet. Let 'er rip!</div>
    </div>

    <div class="control-panel">
        <button class="utility-btn btn-undo" onclick="undoLast()">Undo Last</button>
        <button class="utility-btn btn-reset" onclick="resetGame()">Reset Match</button>
    </div>

    <script>
        let p1Score = 0;
        let p2Score = 0;
        let p1Sets = 0;
        let p2Sets = 0;
        
        let winLimit = 4;      
        let setsWinLimit = 2;  
        
        let scoreHistory = [];
        let matchIsOver = false;
        let midRoundTimeoutToken = null;
        let victoryTimeoutToken = null;

        let activeAudioTracks = [];

        function unlockAudioEngine() {
            let contextUnlock = new Audio();
            contextUnlock.play().catch(e => {});
            window.removeEventListener('mousedown', unlockAudioEngine);
            window.removeEventListener('touchstart', unlockAudioEngine);
        }
        window.addEventListener('mousedown', unlockAudioEngine);
        window.addEventListener('touchstart', unlockAudioEngine);

        function playCustomSound(fileName) {
            try {
                let cacheBuster = "?v=" + new Date().getTime();
                let track = new Audio(fileName + '.mp3' + cacheBuster);
                activeAudioTracks.push(track);
                
                track.play().catch(error => {
                    console.log("Audio pipeline waiting context:", error);
                });

                track.onended = () => {
                    activeAudioTracks = activeAudioTracks.filter(t => t !== track);
                };
            } catch(e) {
                console.log("Audio error:", e);
            }
        }

        function stopAllAudio() {
            activeAudioTracks.forEach(track => {
                try { track.pause(); track.currentTime = 0; } catch(e){}
            });
            activeAudioTracks = [];
        }

        function adjustPointsLimit(amount) {
            if(matchIsOver || scoreHistory.length > 0) return; 
            let newLimit = winLimit + amount;
            if (newLimit >= 1 && newLimit <= 10) { 
                winLimit = newLimit;
                document.getElementById('limit-display').innerText = winLimit;
                resetGame();
            }
        }

        document.getElementById('p1-name').addEventListener('click', (e) => e.stopPropagation());
        document.getElementById('p2-name').addEventListener('click', (e) => e.stopPropagation());
        document.getElementById('p1-name').addEventListener('touchstart', (e) => e.stopPropagation());
        document.getElementById('p2-name').addEventListener('touchstart', (e) => e.stopPropagation());

        function adjustSetsLimit(amount) {
            if(matchIsOver || scoreHistory.length > 0) return;
            let newLimit = setsWinLimit + amount;
            if (newLimit >= 1 && newLimit <= 5) {
                setsWinLimit = newLimit;
                document.getElementById('sets-limit-display').innerText = setsWinLimit;
                resetGame();
            }
        }

        function startCountdown() {
            if(matchIsOver) return;
            playCustomSound('countdown');
        }

        function addScore(player, points, finishType) {
            if (matchIsOver || midRoundTimeoutToken) return; 

            let p1Name = document.getElementById('p1-name').value;
            let p2Name = document.getElementById('p2-name').value;
            let displayElement = document.getElementById(player === 1 ? 'p1-display' : 'p2-display');

            let formattedFinish = finishType.charAt(0).toUpperCase() + finishType.slice(1);
            let scorerName = player === 1 ? p1Name : p2Name;
            let logDescription = `${scorerName} scored +${points} [${formattedFinish}]`;

            scoreHistory.push({
                p1Score: p1Score, p2Score: p2Score,
                p1Sets: p1Sets, p2Sets: p2Sets,
                logText: logDescription
            });

            let setAwarded = false;
            let currentWinner = "";

            if (player === 1) {
                p1Score += points;
                document.getElementById('p1-display').innerText = p1Score;
                triggerPopAnimation(displayElement);
                
                if (p1Score >= winLimit) {
                    p1Sets += 1;
                    setAwarded = true;
                    currentWinner = p1Name;
                    logDescription += ` ⭐ Set ${p1Name}`;
                    scoreHistory[scoreHistory.length - 1].logText = logDescription;
                    if (p1Sets >= setsWinLimit) matchIsOver = true; 
                }
            } else {
                p2Score += points;
                document.getElementById('p2-display').innerText = p2Score;
                triggerPopAnimation(displayElement);
                
                if (p2Score >= winLimit) {
                    p2Sets += 1;
                    setAwarded = true;
                    currentWinner = p2Name;
                    logDescription += ` ⭐ Set ${p2Name}`;
                    scoreHistory[scoreHistory.length - 1].logText = logDescription;
                    if (p2Sets >= setsWinLimit) matchIsOver = true; 
                }
            }

            if (setAwarded) {
                triggerMiddleAnnouncement(finishType, () => {
                    triggerSetCompleteAnnouncement(currentWinner);
                });
            } else {
                triggerMiddleAnnouncement(finishType);
            }

            updateUI();
            updateLogDisplay(logDescription);
        }

        function updateUI() {
            document.getElementById('p1-display').innerText = p1Score;
            document.getElementById('p2-display').innerText = p2Score;
            document.getElementById('p1-sets').innerText = p1Sets;
            document.getElementById('p2-sets').innerText = p2Sets;
        }

        function updateLogDisplay(text) {
            const logContainer = document.getElementById('history-log');
            const emptyMsg = document.getElementById('empty-log-msg');
            if (emptyMsg) emptyMsg.remove();

            let roundNumber = scoreHistory.length;
            let logRow = document.createElement('div');
            logRow.style.padding = '4px 6px';
            logRow.style.borderBottom = '1px solid #2a2a2a';
            logRow.style.fontSize = '0.8rem';
            logRow.style.color = text.includes('⭐') ? '#ff4757' : '#ffffff';
            
            logRow.innerHTML = `<b style="color: #ffcc00;">R${roundNumber}:</b> ${text} <span style="float: right; color: #a4b0be;">[S:${p1Sets}-${p2Sets} P:${p1Score}-${p2Score}]</span>`;
            
            logContainer.appendChild(logRow);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function undoLast() {
            if(victoryTimeoutToken) { clearTimeout(victoryTimeoutToken); victoryTimeoutToken = null; }
            if(midRoundTimeoutToken) { clearTimeout(midRoundTimeoutToken); midRoundTimeoutToken = null; }

            matchIsOver = false;
            stopAllAudio();
            document.getElementById('backdrop-layer').classList.remove('active');
            document.getElementById('announcement-layer').className = '';
            document.getElementById('announcement-layer').innerHTML = '';
            document.body.classList.remove('shake-active');

            if (scoreHistory.length > 0) {
                let lastState = scoreHistory.pop();
                
                p1Score = lastState.p1Score;
                p2Score = lastState.p2Score;
                p1Sets = lastState.p1Sets;
                p2Sets = lastState.p2Sets;
                
                const logContainer = document.getElementById('history-log');
                logContainer.innerHTML = ''; 
                
                if (scoreHistory.length === 0) {
                    logContainer.innerHTML = `<div id="empty-log-msg">No rounds recorded yet. Let 'er rip!</div>`;
                } else {
                    let workingHistory = [...scoreHistory];
                    scoreHistory = [];
                    
                    workingHistory.forEach((snapshot) => {
                        scoreHistory.push(snapshot);
                        let roundRow = document.createElement('div');
                        roundRow.style.padding = '4px 6px';
                        roundRow.style.borderBottom = '1px solid #2a2a2a';
                        roundRow.style.fontSize = '0.8rem';
                        roundRow.style.color = snapshot.logText.includes('⭐') ? '#ff4757' : '#ffffff';
                        
                        roundRow.innerHTML = `<b style="color: #ffcc00;">R${scoreHistory.length}:</b> ${snapshot.logText}`;
                        logContainer.appendChild(roundRow);
                    });
                }
                updateUI();
            }
        }

        function triggerMiddleAnnouncement(type, chainCallback) {
            const backdrop = document.getElementById('backdrop-layer');
            const el = document.getElementById('announcement-layer');
            
            backdrop.classList.add('active');
            
            let formattedName = type.charAt(0).toUpperCase() + type.slice(1);
            el.innerText = formattedName + " Finish!";
            el.className = '';
            void el.offsetWidth; 
            el.classList.add('anim-' + type, 'txt-' + type);

            if (type === 'burst' || type === 'xtreme') {
                document.body.classList.remove('shake-active');
                void document.body.offsetWidth;
                document.body.classList.add('shake-active');
            }

            playCustomSound(type);

            midRoundTimeoutToken = setTimeout(() => {
                backdrop.classList.remove('active');
                document.body.classList.remove('shake-active');
                midRoundTimeoutToken = null;
                if (chainCallback) chainCallback();
            }, 2200);
        }

        function triggerSetCompleteAnnouncement(setWinner) {
            const backdrop = document.getElementById('backdrop-layer');
            const el = document.getElementById('announcement-layer');
            
            backdrop.classList.add('active');
            el.innerHTML = `SET COMPLETE!<span class="sub-set">${setWinner} wins set!</span>`;
            el.className = '';
            void el.offsetWidth;
            
            el.classList.add('anim-set-complete', 'txt-set-complete');
            playCustomSound('victory'); 

            midRoundTimeoutToken = setTimeout(() => {
                backdrop.classList.remove('active');
                midRoundTimeoutToken = null;
                
                if (matchIsOver) {
                    triggerWinnerDisplay(setWinner);
                } else {
                    p1Score = 0;
                    p2Score = 0;
                    updateUI();
                }
            }, 3200);
        }

        function triggerWinnerDisplay(winnerName) {
            const backdrop = document.getElementById('backdrop-layer');
            const el = document.getElementById('announcement-layer');
            
            backdrop.classList.add('active');
            el.innerHTML = `MATCH OVER!<span class="sub-victory">${winnerName} Wins!</span>`;
            el.className = '';
            void el.offsetWidth;
            
            el.classList.add('anim-victory', 'txt-victory');
            playCustomSound('victory');
        }

        function triggerPopAnimation(element) {
            element.classList.remove('pop');
            void element.offsetWidth;        
            element.classList.add('pop');    
        }

        function resetGame() {
            if(victoryTimeoutToken) { clearTimeout(victoryTimeoutToken); victoryTimeoutToken = null; }
            if(midRoundTimeoutToken) { clearTimeout(midRoundTimeoutToken); midRoundTimeoutToken = null; }

            matchIsOver = false;
            stopAllAudio();
            p1Score = 0;
            p2Score = 0;
            p1Sets = 0;
            p2Sets = 0;
            scoreHistory = [];
            
            updateUI();
            
            document.body.classList.remove('shake-active');
            document.getElementById('p1-display').classList.remove('pop');
            document.getElementById('p2-display').classList.remove('pop');
            document.getElementById('backdrop-layer').classList.remove('active');
            document.getElementById('announcement-layer').className = '';
            document.getElementById('announcement-layer').innerHTML = '';

            const logContainer = document.getElementById('history-log');
            logContainer.innerHTML = `<div id="empty-log-msg">No rounds recorded yet. Let 'er rip!</div>`;
        }
    </script>
</body>
</html>
